<div class="flex flex-col min-w-0 flex-1 px-5 justify-start items-start gap-6">
  
  <div class="flex flex-col w-full gap-3 mt-4">
    <div class="text-[#112B3C] text-[36px] font-google-sans-flex font-bold">Configurações de Tarifas</div>
    <div class="flex flex-col p-6 bg-[#EEEEEF] rounded-3xl gap-4">

      <div class="flex justify-between items-center">
        <span class="text-[#112B3C] text-[22px] font-google-sans-flex font-bold">Definir valores globais</span>
        <div class="flex items-center gap-2">
          <span class="text-[#112B3C] text-[20px] font-google-sans-flex font-bold">Tarifa/km atual:</span>
          <img src="assets/icons/dollar-circle.svg" class="w-4 h-4 opacity-70" alt="Valor">
          <span class="text-[#646464] text-[18px] font-bold">R${{ pricing.perKmRate | number:'1.2-2' }}</span>
        </div>
      </div>

      <!-- 4 campos de tarifa -->
      <div class="flex gap-4 flex-wrap">
        <div class="flex flex-col flex-1 min-w-[200px] gap-1">
          <div class="text-[#112B3C] text-sm font-google-sans-flex font-medium">Tarifa mínima (R$)</div>
          <div class="flex p-3 bg-[#FAFAFA] rounded-lg border border-transparent focus-within:border-[#F66B0E] transition-colors">
            <input type="number" [(ngModel)]="pricing.minimumFare" min="0" step="0.01" placeholder="Ex: 10.00" class="flex-1 border-none bg-transparent outline-none text-[#646464] text-base font-work-sans">
          </div>
        </div>
        <div class="flex flex-col flex-1 min-w-[200px] gap-1">
          <div class="text-[#112B3C] text-sm font-google-sans-flex font-medium">Valor por km (R$)</div>
          <div class="flex p-3 bg-[#FAFAFA] rounded-lg border border-transparent focus-within:border-[#F66B0E] transition-colors">
            <input type="number" [(ngModel)]="pricing.perKmRate" min="0" step="0.01" placeholder="Ex: 1.50" class="flex-1 border-none bg-transparent outline-none text-[#646464] text-base font-work-sans">
          </div>
        </div>
        <div class="flex flex-col flex-1 min-w-[200px] gap-1">
          <div class="text-[#112B3C] text-sm font-google-sans-flex font-medium">Taxa de cancelamento (R$)</div>
          <div class="flex p-3 bg-[#FAFAFA] rounded-lg border border-transparent focus-within:border-[#F66B0E] transition-colors">
            <input type="number" [(ngModel)]="pricing.cancellationFee" min="0" step="0.01" placeholder="Ex: 2.50" class="flex-1 border-none bg-transparent outline-none text-[#646464] text-base font-work-sans">
          </div>
        </div>
        <div class="flex flex-col flex-1 min-w-[200px] gap-1">
          <div class="text-[#112B3C] text-sm font-google-sans-flex font-medium">Comissão (%)</div>
          <div class="flex p-3 bg-[#FAFAFA] rounded-lg border border-transparent focus-within:border-[#F66B0E] transition-colors">
            <input type="number" [(ngModel)]="pricing.commissionRate" min="0" max="100" step="0.1" placeholder="Ex: 15.0" class="flex-1 border-none bg-transparent outline-none text-[#646464] text-base font-work-sans">
          </div>
        </div>
      </div>

      <div class="flex justify-between items-center mt-2 flex-wrap gap-4">
        <div class="text-[#646464] text-[16px] font-google-sans-flex">
          Valor simulado para 100km:
          <img src="assets/icons/dollar-circle.svg" class="w-4 h-4 opacity-70 inline ml-1" alt="Valor">
          <strong class="text-[#112B3C]">R${{ pricing.perKmRate * 100 | number:'1.2-2' }}</strong>
        </div>
        <div (click)="saveRate()" class="cursor-pointer w-[280px] p-3.5 bg-[#F66B0E] hover:brightness-110 transition shadow-md rounded-lg text-[#EEEEEF] text-[16px] font-google-sans-flex font-bold uppercase text-center">
          Salvar Configurações
        </div>
      </div>

    </div>
  </div>
</div>
